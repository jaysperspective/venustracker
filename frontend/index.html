<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' capacitor://localhost;
               script-src 'self';
               style-src 'self' 'unsafe-inline';
               img-src 'self' data: blob: https://venustracker-production.up.railway.app;
               media-src 'self' blob:;
               connect-src 'self' https://venustracker-production.up.railway.app https://nominatim.openstreetmap.org;
               frame-ancestors 'none'" />

    <!-- Viewport — prevent user-scaling so it feels native -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS standalone web app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Venus" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme colour (Android + Chrome) -->
    <meta name="theme-color" content="#3D3D2E" />

    <!-- Standard favicon fallback -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <title>Venus Tracker</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
